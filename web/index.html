<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uxflows runner</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>uxflows runner</h1>
        <div id="status" class="status idle">
          <span class="dot"></span>
          <span class="label">idle</span>
        </div>
      </header>

      <section class="phase">
        <p>
          Pick a v0 spec JSON, then <strong>Connect</strong> and talk to the
          agent.
        </p>
      </section>

      <section class="spec">
        <button id="pick-spec" class="ghost" type="button">Load spec…</button>
        <input id="spec-file" type="file" accept="application/json,.json" hidden />
        <span id="spec-summary" class="spec-summary">no spec loaded</span>
        <button id="clear-spec" class="link" type="button" hidden>clear</button>
      </section>

      <section class="controls">
        <button id="connect" type="button" disabled>Connect</button>
        <button id="disconnect" type="button" disabled>Disconnect</button>
        <select id="language" title="Scope scripts and FAQ to a single language, or emit all. Locked once connected." disabled>
          <option value="">all languages</option>
        </select>
      </section>

      <section id="errors" class="errors" hidden></section>

      <section class="audio">
        <audio id="remote-audio" autoplay playsinline></audio>
      </section>

      <section class="log">
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>
    <script type="module" src="/client.js"></script>
  </body>
</html>
